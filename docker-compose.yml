services:
  postgres:
    image: postgres:18-alpine
    container_name: mosaic-postgres
    environment:
      POSTGRES_DB: mosaic
      POSTGRES_USER: mosaic
      POSTGRES_PASSWORD: mosaic
    ports:
      - "5432:5432"
    volumes:
      - mosaic-postgres-18-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mosaic -d mosaic"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  mosaic-postgres-18-data:
